name: Availability Checks

on:
  workflow_dispatch:

jobs:
  synthetic-checks:
    name: Synthetic Availability/Latency
    runs-on: ubuntu-latest
    env:
      BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
      BACKEND_HEALTH_API_KEY: ${{ secrets.BACKEND_HEALTH_API_KEY }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      MAX_BACKEND_HEALTH_LATENCY_MS: '2000'
      MAX_FRONTEND_LATENCY_MS: '2500'
    steps:
      - name: Backend health check
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${BACKEND_HEALTH_URL:-}" ]]; then
            echo "BACKEND_HEALTH_URL not configured; skipping backend check."
            exit 0
          fi

          if [[ "${BACKEND_HEALTH_URL}" != https://* ]]; then
            echo "::error::BACKEND_HEALTH_URL must use https:// in production"
            exit 1
          fi

          tmp_file="$(mktemp)"
          headers=()
          if [[ -n "${BACKEND_HEALTH_API_KEY:-}" ]]; then
            headers+=(-H "x-health-key: ${BACKEND_HEALTH_API_KEY}")
          fi

          start_ms="$(date +%s%3N)"
          status_code="$(curl -sS -o "${tmp_file}" -w "%{http_code}" "${headers[@]}" "${BACKEND_HEALTH_URL}")"
          end_ms="$(date +%s%3N)"
          latency_ms="$((end_ms - start_ms))"

          echo "Backend status=${status_code} latencyMs=${latency_ms}"
          cat "${tmp_file}"

          if [[ "${status_code}" -ne 200 ]]; then
            echo "::error::Backend health returned HTTP ${status_code}"
            exit 1
          fi

          if ! jq -e '.status == "ok"' "${tmp_file}" > /dev/null; then
            echo "::error::Backend health payload missing status=ok"
            exit 1
          fi

          if (( latency_ms > MAX_BACKEND_HEALTH_LATENCY_MS )); then
            echo "::error::Backend latency ${latency_ms}ms exceeded ${MAX_BACKEND_HEALTH_LATENCY_MS}ms"
            exit 1
          fi

      - name: Frontend availability check
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${FRONTEND_URL:-}" ]]; then
            echo "FRONTEND_URL not configured; skipping frontend check."
            exit 0
          fi

          if [[ "${FRONTEND_URL}" != https://* ]]; then
            echo "::error::FRONTEND_URL must use https:// in production"
            exit 1
          fi

          start_ms="$(date +%s%3N)"
          status_code="$(curl -sS -o /dev/null -w "%{http_code}" "${FRONTEND_URL}")"
          end_ms="$(date +%s%3N)"
          latency_ms="$((end_ms - start_ms))"

          echo "Frontend status=${status_code} latencyMs=${latency_ms}"

          if [[ "${status_code}" -lt 200 || "${status_code}" -ge 400 ]]; then
            echo "::error::Frontend availability check returned HTTP ${status_code}"
            exit 1
          fi

          if (( latency_ms > MAX_FRONTEND_LATENCY_MS )); then
            echo "::error::Frontend latency ${latency_ms}ms exceeded ${MAX_FRONTEND_LATENCY_MS}ms"
            exit 1
          fi
