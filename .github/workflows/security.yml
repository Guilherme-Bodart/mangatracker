name: Security

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-audit:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: manga-list-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: manga-list-backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (critical gate)
        run: pnpm run security:audit

      - name: Audit (high visibility)
        run: pnpm run security:audit:high
        continue-on-error: true

  frontend-audit:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: manga-list
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: manga-list/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (critical gate)
        run: pnpm run security:audit

      - name: Audit (high visibility)
        run: pnpm run security:audit:high
        continue-on-error: true
