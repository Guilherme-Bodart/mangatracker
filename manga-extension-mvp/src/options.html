<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Manga Tracker Sync - Configurações</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        margin: 24px;
        max-width: 720px;
      }
      label {
        display: block;
        margin: 12px 0 4px;
        font-weight: 600;
      }
      input, textarea {
        width: 100%;
        padding: 8px;
      }
      .row {
        margin-bottom: 12px;
      }
      button {
        margin-top: 12px;
        padding: 10px 14px;
      }
      #status {
        margin-top: 12px;
        color: #0a5;
      }
      .help {
        margin: 0;
        color: #555;
        font-size: 14px;
      }
      .section {
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <h1>Manga Tracker Sync - Configurações</h1>
    <p class="help">
      Esta extensão sincroniza automaticamente capítulos lidos de sites parceiros com a sua conta.
    </p>

    <div class="row">
      <label>
        <input id="enabled" type="checkbox" />
        Ativar extensão
      </label>
    </div>

    <div class="row">
      <label for="apiBaseUrl">URL base da API</label>
      <input id="apiBaseUrl" placeholder="https://api.example.com" />
    </div>

    <div class="row">
      <label for="partnerSlug">Slug do parceiro</label>
      <input id="partnerSlug" placeholder="site-a" />
    </div>

    <div class="row">
      <label for="accessToken">Token de integração</label>
      <textarea id="accessToken" rows="4"></textarea>
    </div>

    <div class="section">
      <h2>Trocar código por token</h2>
      <p class="help">Use apenas para conectar a conta na primeira vez.</p>
    </div>
    <div class="row">
      <label for="connectCode">Código de conexão</label>
      <input id="connectCode" placeholder="código gerado em /profile/integrations" />
    </div>

    <div class="row">
      <label for="clientSecret">Client secret do parceiro</label>
      <input id="clientSecret" type="password" placeholder="secret do parceiro" />
    </div>

    <div class="row">
      <label for="sourceDomain">Domínio de origem</label>
      <input id="sourceDomain" placeholder="mangalivre.tv" />
    </div>

    <div class="row">
      <label for="allowedDomains">Domínios permitidos (um por linha)</label>
      <textarea id="allowedDomains" rows="6" placeholder="site-a.com&#10;reader.site-a.com"></textarea>
    </div>

    <button id="saveBtn" type="button">Salvar</button>
    <button id="exchangeBtn" type="button">Trocar código</button>
    <div id="status"></div>

    <script type="module" src="./options.js"></script>
  </body>
</html>
